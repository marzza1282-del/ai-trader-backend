<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trading</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f1a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

button {
    padding: 15px 30px;
    background: #00c853;
    border: none;
    color: white;
    font-size: 18px;
    margin-top: 20px;
    border-radius: 8px;
}

.result {
    margin-top: 20px;
}

.buy { color: #00ff99; font-size: 40px; }
.sell { color: #ff4d4d; font-size: 40px; }
</style>
</head>

<body>

<h1>📊 AI Trading Analyzer</h1>

<input type="file" id="file">

<br>

<button onclick="analyze()">ANALYZE</button>

<div id="result"></div>

<script>
async function analyze() {
    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Upload dulu chart!");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("https://web-production-67f2f.up.railway.app/upload-chart", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    let s = data.analysis.signal;

    document.getElementById("result").innerHTML = `
        <h2 class="${s.toLowerCase()}">${s}</h2>
        <p>Confidence: ${data.analysis.confidence}%</p>
        <p>Entry: ${data.analysis.entry}</p>
        <p>SL: ${data.analysis.stop_loss}</p>
        <p>TP: ${data.analysis.take_profit}</p>
    `;
}
</script>

</body>
</html>
